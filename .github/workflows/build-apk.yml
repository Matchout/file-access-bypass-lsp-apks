name: Build LSP APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MODULE_NAME: FileAccessBypassLSP
      APP_ID: io.github.fileaccess.bypass.lsp
      TARGET_PACKAGES: com.baidu.netdisk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Generate Android project
        shell: bash
        run: |
          set -e

          mkdir -p app/src/main/java/io/github/fileaccess/bypass/lsp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p app/libs
          mkdir -p xposed-stub-src/de/robv/android/xposed/callbacks
          mkdir -p xposed-stub-src/de/robv/android/xposed
          # fix: 目标目录必须在 javac 前创建，原版缺少此行
          mkdir -p xposed-stub-classes

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "FileAccessBypassLSP"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.13.0" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "io.github.fileaccess.bypass.lsp"
              compileSdk 36

              defaultConfig {
                  applicationId "io.github.fileaccess.bypass.lsp"
                  minSdk 23
                  targetSdk 36
                  versionCode 1
                  versionName "0.1.0"
              }

              buildTypes {
                  debug {
                      minifyEnabled false
                  }

                  release {
                      minifyEnabled false
                      signingConfig null
                  }
              }
          }

          dependencies {
              compileOnly files("libs/xposed-api-stub.jar")
          }
          EOF

          cat > xposed-stub-src/de/robv/android/xposed/IXposedHookLoadPackage.java <<'EOF'
          package de.robv.android.xposed;

          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public interface IXposedHookLoadPackage {
              void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable;
          }
          EOF

          cat > xposed-stub-src/de/robv/android/xposed/XC_MethodHook.java <<'EOF'
          package de.robv.android.xposed;

          public abstract class XC_MethodHook {
              protected void beforeHookedMethod(MethodHookParam param) throws Throwable {}
              protected void afterHookedMethod(MethodHookParam param) throws Throwable {}

              public static class MethodHookParam {
                  public Object thisObject;
                  public Object[] args;
                  private Object result;

                  public void setResult(Object result) {
                      this.result = result;
                  }

                  public Object getResult() {
                      return result;
                  }
              }
          }
          EOF

          cat > xposed-stub-src/de/robv/android/xposed/XposedBridge.java <<'EOF'
          package de.robv.android.xposed;

          public final class XposedBridge {
              private XposedBridge() {}

              public static void log(String text) {}
              public static void log(Throwable throwable) {}
          }
          EOF

          cat > xposed-stub-src/de/robv/android/xposed/XposedHelpers.java <<'EOF'
          package de.robv.android.xposed;

          public final class XposedHelpers {
              private XposedHelpers() {}

              public static void findAndHookMethod(Class<?> clazz, String methodName, Object... parameterTypesAndCallback) {}

              public static Class<?> findClass(String className, ClassLoader classLoader) {
                  try {
                      if (classLoader == null) {
                          return Class.forName(className);
                      }
                      return Class.forName(className, false, classLoader);
                  } catch (ClassNotFoundException e) {
                      throw new RuntimeException(e);
                  }
              }
          }
          EOF

          cat > xposed-stub-src/de/robv/android/xposed/callbacks/XC_LoadPackage.java <<'EOF'
          package de.robv.android.xposed.callbacks;

          public final class XC_LoadPackage {
              private XC_LoadPackage() {}

              public static class LoadPackageParam {
                  public String packageName;
                  public String processName;
                  public ClassLoader classLoader;
                  public boolean isFirstApplication;
              }
          }
          EOF

          # fix: --release 8 替代已弃用的 -source 8 -target 8
          javac --release 8 -d xposed-stub-classes $(find xposed-stub-src -name "*.java")
          jar cf app/libs/xposed-api-stub.jar -C xposed-stub-classes .

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">File Access Bypass LSP</string>
              <string name="xposed_description">Bypass selected apps' all-files-access checks without granting real storage expansion.</string>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="false"
                  android:extractNativeLibs="false"
                  android:hasCode="true"
                  android:label="@string/app_name"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">

                  <meta-data
                      android:name="xposedmodule"
                      android:value="true" />

                  <meta-data
                      android:name="xposeddescription"
                      android:value="@string/xposed_description" />

                  <meta-data
                      android:name="xposedminversion"
                      android:value="101" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/assets/xposed_init <<'EOF'
          io.github.fileaccess.bypass.lsp.MainHook
          EOF

          # fix: 补全遗漏的 AppOps 方法；完整覆盖六种查询路径
          cat > app/src/main/java/io/github/fileaccess/bypass/lsp/MainHook.java <<'EOF'
          package io.github.fileaccess.bypass.lsp;

          import android.app.AppOpsManager;
          import android.content.pm.PackageManager;
          import android.os.Environment;

          import java.io.File;
          import java.util.Arrays;
          import java.util.HashSet;
          import java.util.Set;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public final class MainHook implements IXposedHookLoadPackage {
              private static final String TAG = "FileAccessBypassLSP";
              private static final String MANAGE_EXTERNAL_STORAGE = "android.permission.MANAGE_EXTERNAL_STORAGE";
              private static final String OPSTR_MANAGE_EXTERNAL_STORAGE = "android:manage_external_storage";

              private static final Set<String> TARGET_PACKAGES = new HashSet<>(Arrays.asList(
                      "com.baidu.netdisk"
              ));

              @Override
              public void handleLoadPackage(final XC_LoadPackage.LoadPackageParam lpparam) {
                  if (lpparam == null || lpparam.packageName == null) {
                      return;
                  }

                  if (!TARGET_PACKAGES.contains(lpparam.packageName)) {
                      return;
                  }

                  log("enabled for " + lpparam.packageName + " / process=" + lpparam.processName);

                  hookEnvironmentChecks();
                  hookAppOpsChecks(lpparam.packageName);
                  hookPackagePermissionChecks(lpparam);
              }

              private static void hookEnvironmentChecks() {
                  try {
                      XposedHelpers.findAndHookMethod(
                              Environment.class,
                              "isExternalStorageManager",
                              new XC_MethodHook() {
                                  @Override
                                  protected void beforeHookedMethod(MethodHookParam param) {
                                      param.setResult(true);
                                  }
                              }
                      );
                      log("hooked Environment.isExternalStorageManager()");
                  } catch (Throwable t) {
                      log("failed to hook Environment.isExternalStorageManager()", t);
                  }

                  try {
                      XposedHelpers.findAndHookMethod(
                              Environment.class,
                              "isExternalStorageManager",
                              File.class,
                              new XC_MethodHook() {
                                  @Override
                                  protected void beforeHookedMethod(MethodHookParam param) {
                                      param.setResult(true);
                                  }
                              }
                      );
                      log("hooked Environment.isExternalStorageManager(File)");
                  } catch (Throwable t) {
                      log("failed to hook Environment.isExternalStorageManager(File)", t);
                  }
              }

              private static void hookAppOpsChecks(final String targetPackageName) {
                  // 原版三个方法保留
                  hookAppOpsStringOp("checkOpNoThrow",         targetPackageName);
                  hookAppOpsStringOp("unsafeCheckOpNoThrow",   targetPackageName);
                  hookAppOpsStringOp("noteOpNoThrow",          targetPackageName);

                  // fix: 补充三个遗漏的方法
                  // checkOp 抛异常而非返回 MODE_ERRORED，部分 app 仍可能调用
                  hookAppOpsStringOp("checkOp",                targetPackageName);
                  // API 30+ 带 attributionTag 的 noteOp 五参数版本
                  hookAppOpsNoteOpFull(targetPackageName);
                  // 内部原始检查，某些 ROM 会暴露给 app 侧
                  hookAppOpsStringOp("unsafeCheckOpRawNoThrow", targetPackageName);
              }

              /** 拦截签名为 (String op, int uid, String packageName) 的 AppOps 方法 */
              private static void hookAppOpsStringOp(final String methodName, final String targetPackageName) {
                  try {
                      XposedHelpers.findAndHookMethod(
                              AppOpsManager.class,
                              methodName,
                              String.class,
                              int.class,
                              String.class,
                              new XC_MethodHook() {
                                  @Override
                                  protected void beforeHookedMethod(MethodHookParam param) {
                                      String op          = argStr(param, 0);
                                      String packageName = argStr(param, 2);

                                      if (OPSTR_MANAGE_EXTERNAL_STORAGE.equals(op)
                                              && (targetPackageName.equals(packageName) || packageName.isEmpty())) {
                                          param.setResult(AppOpsManager.MODE_ALLOWED);
                                          log("spoofed AppOps " + methodName + " for " + packageName);
                                      }
                                  }
                              }
                      );
                      log("hooked AppOpsManager." + methodName + "(String,int,String)");
                  } catch (Throwable t) {
                      log("failed to hook AppOpsManager." + methodName, t);
                  }
              }

              /**
               * API 30+ 新增的五参数 noteOp：
               *   noteOp(String op, int uid, String packageName,
               *          String attributionTag, String message)
               */
              private static void hookAppOpsNoteOpFull(final String targetPackageName) {
                  try {
                      XposedHelpers.findAndHookMethod(
                              AppOpsManager.class,
                              "noteOp",
                              String.class,
                              int.class,
                              String.class,
                              String.class,
                              String.class,
                              new XC_MethodHook() {
                                  @Override
                                  protected void beforeHookedMethod(MethodHookParam param) {
                                      String op          = argStr(param, 0);
                                      String packageName = argStr(param, 2);

                                      if (OPSTR_MANAGE_EXTERNAL_STORAGE.equals(op)
                                              && (targetPackageName.equals(packageName) || packageName.isEmpty())) {
                                          param.setResult(AppOpsManager.MODE_ALLOWED);
                                          log("spoofed AppOps noteOp(5-arg) for " + packageName);
                                      }
                                  }
                              }
                      );
                      log("hooked AppOpsManager.noteOp(String,int,String,String,String)");
                  } catch (Throwable t) {
                      // API < 30 的设备不存在此方法，忽略即可
                      log("skipped AppOpsManager.noteOp(5-arg): " + t.getMessage());
                  }
              }

              private static void hookPackagePermissionChecks(final XC_LoadPackage.LoadPackageParam lpparam) {
                  try {
                      Class<?> appPackageManagerClass = XposedHelpers.findClass(
                              "android.app.ApplicationPackageManager",
                              lpparam.classLoader
                      );

                      XposedHelpers.findAndHookMethod(
                              appPackageManagerClass,
                              "checkPermission",
                              String.class,
                              String.class,
                              new XC_MethodHook() {
                                  @Override
                                  protected void beforeHookedMethod(MethodHookParam param) {
                                      String permission  = argStr(param, 0);
                                      String packageName = argStr(param, 1);

                                      if (MANAGE_EXTERNAL_STORAGE.equals(permission)
                                              && lpparam.packageName.equals(packageName)) {
                                          param.setResult(PackageManager.PERMISSION_GRANTED);
                                          log("granted PackageManager.checkPermission for " + packageName);
                                      }
                                  }
                              }
                      );

                      log("hooked ApplicationPackageManager.checkPermission(String,String)");
                  } catch (Throwable t) {
                      log("failed to hook ApplicationPackageManager.checkPermission", t);
                  }
              }

              /** 安全地从 MethodHookParam.args 中取字符串，避免 NPE */
              private static String argStr(XC_MethodHook.MethodHookParam param, int index) {
                  if (param.args == null || index >= param.args.length || param.args[index] == null) {
                      return "";
                  }
                  return String.valueOf(param.args[index]);
              }

              private static void log(String message) {
                  XposedBridge.log(TAG + ": " + message);
              }

              private static void log(String message, Throwable throwable) {
                  XposedBridge.log(TAG + ": " + message);
                  XposedBridge.log(throwable);
              }
          }
          EOF

      - name: Build APKs
        shell: bash
        run: |
          gradle :app:assembleDebug :app:assembleRelease --stacktrace

      - name: Collect APKs
        shell: bash
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/*.apk   out/ || true
          cp app/build/outputs/apk/release/*.apk out/ || true
          ls -lah out

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: file-access-bypass-lsp-apks
          path: out/*.apk
